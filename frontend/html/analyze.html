<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisis — SkinCare Analyzer</title>

<!-- Google Fonts: Outfit & Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Shared stylesheet -->
<link rel="stylesheet" href="/css/style.css">

<style>
  /* ===== ANALYZE PAGE SPECIFIC STYLES ===== */

  .analyze-wrapper {
    padding: 40px clamp(24px, 7.2vw, 104px) 60px;
  }

  .analyze-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 3.4vw, 48px);
    color: var(--pink-accent);
    margin: 0 0 32px 0;
  }

  /* ===== UPLOAD + PREVIEW ROW ===== */
  .upload-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 28px;
  }

  /* Upload box */
  .upload-box {
    border: 2.5px dashed var(--pink-soft2);
    border-radius: 16px;
    background-color: #fff5f8;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background-color 0.2s;
    padding: 24px;
    position: relative;
  }

  .upload-box:hover,
  .upload-box.drag-over {
    border-color: var(--pink-primary);
    background-color: #ffe8ef;
  }

  .upload-box input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    color: var(--pink-soft2);
  }

  .upload-label {
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: var(--pink-soft2);
  }

  .btn-choose {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    background-color: var(--pink-primary);
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    cursor: pointer;
    pointer-events: none; /* click handled by file input */
    box-shadow: 0 2px 8px rgba(255, 64, 129, 0.3);
  }

  /* Preview box */
  .preview-box {
    border-radius: 20px;
    background-color: var(--pink-soft);
    min-height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .preview-placeholder {
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }

  .preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
    display: none;
  }

  /* ===== ANALYZE BUTTON ===== */
  .btn-analyze {
    width: 100%;
    height: 52px;
    background-color: var(--pink-accent);
    border: none;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 2px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(214, 51, 108, 0.4);
    transition: background-color 0.2s, transform 0.1s;
    margin-bottom: 36px;
  }

  .btn-analyze:hover {
    background-color: var(--pink-strong);
    transform: translateY(-1px);
  }

  .btn-analyze:active {
    transform: translateY(0);
  }

  .btn-analyze:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ===== RESULT SECTION ===== */
  .result-section {
    display: none;
    flex-direction: column;
    gap: 24px;
    animation: fadeUp 0.4s ease;
  }

  .result-section.visible {
    display: flex;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Result summary bar */
  .result-bar {
    background-color: #fff;
    border: 2px solid #ffd6e7;
    border-radius: 14px;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 24px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: clamp(15px, 1.6vw, 18px);
    color: #2d2d2d;
  }

  /* Severity badges */
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    padding: 5px 20px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #1a1a1a;
    min-width: 80px;
  }

  .badge-rendah  { background-color: #6EE66E; }
  .badge-sedang  { background-color: #F5E642; }
  .badge-tinggi  { background-color: #F55050; color: #fff; }

  /* Confidence score */
  .confidence {
    margin-left: auto;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: clamp(18px, 2vw, 24px);
    color: #6EE66E;
  }

  .confidence span {
    font-weight: 500;
    font-size: 0.75em;
    color: #555;
    margin-left: 2px;
  }

  /* ===== RECOMMENDATION CARDS ===== */
  .rec-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .rec-card {
    background-color: var(--pink-soft2);
    border-radius: 16px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .rec-icon {
    width: 40px;
    height: 40px;
    color: #4a2030;
  }

  .rec-icon svg {
    width: 100%;
    height: 100%;
  }

  .rec-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: clamp(14px, 1.4vw, 16px);
    color: #2d0a18;
    line-height: 1.45;
  }

  /* Loading state */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,245,248,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.visible {
    display: flex;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--pink-soft);
    border-top-color: var(--pink-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--pink-accent);
  }

  /* Responsive */
  @media (max-width: 720px) {
    .upload-row { grid-template-columns: 1fr; }
    .rec-grid   { grid-template-columns: 1fr; }
    .confidence { margin-left: 0; }
  }

  @media (max-width: 480px) {
    .rec-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <a href="index.html" class="topbar-logo">SkinCare Analyzer</a>
    <nav class="topbar-nav">
      <a href="index.html">Home</a>
      <a href="analyze.html" class="active">Analize</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="analyze-wrapper">

    <h1 class="analyze-title">Analize Your Skin Now</h1>

    <!-- Upload + Preview -->
    <div class="upload-row">
      <!-- Upload Box -->
      <div class="upload-box" id="uploadBox">
        <input type="file" id="fileInput" accept="image/*">

        <svg class="upload-icon" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="10" width="56" height="40" rx="6" stroke="#FFA9B4" stroke-width="3" fill="none"/>
          <circle cx="22" cy="26" r="6" stroke="#FFA9B4" stroke-width="3" fill="none"/>
          <path d="M4 40 L18 28 L28 38 L38 26 L60 44" stroke="#FFA9B4" stroke-width="3" stroke-linejoin="round" fill="none"/>
        </svg>

        <p class="upload-label">Upload Your Image</p>
        <button class="btn-choose" tabindex="-1">Choose File</button>
      </div>

      <!-- Preview Box -->
      <div class="preview-box" id="previewBox">
        <span class="preview-placeholder">preview image</span>
        <img id="previewImg" src="" alt="Preview">
      </div>
    </div>

    <!-- Analyze Button -->
    <button class="btn-analyze" id="btnAnalyze" disabled>Analisis Sekarang</button>

    <!-- Result Section -->
    <div class="result-section" id="resultSection">

      <div class="result-bar">

        <div class="result-item">
          Acne :
          <span class="badge" id="badgeAcne">-</span>
        </div>

        <div class="result-item">
          Oiliness :
          <span class="badge" id="badgeOil">-</span>
        </div>

      </div>

      <div class="result-bar">

        <div class="result-item">
          Acne Confidence :
          <strong id="acneConfidence">-</strong>
        </div>

        <div class="result-item">
          Oiliness Confidence :
          <strong id="oilConfidence">-</strong>
        </div>

      </div>

      <div class="rec-grid" id="recGrid">
        <!-- filled by JS -->
      </div>

    </div>
  </main>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p class="loading-text">Menganalisis kulit kamu...</p>

    function applyBadge(el, level) {

      sedang: [

          <div class="rec-icon">${ICONS[r.icon]}</div>
          <p class="rec-text">${r.text}</p>
        </div>

    }

      const file = fileInput.files[0];
